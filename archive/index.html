<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --accent-dim: #8aad00;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4444;
    --done: #3a3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    display: flex;
    align-items: flex-end;
    gap: 12px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 4px;
    color: var(--accent);
    line-height: 1;
  }

  .share-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    font-size: 0.75rem;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .share-btn:hover { background: var(--accent); color: #000; }

  /* SETUP PANEL */
  #setup-panel {
    margin: 24px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
  }

  #setup-panel h2 {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .field { margin-bottom: 12px; }

  .field label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.85rem;
    font-family: 'Noto Sans JP', sans-serif;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }

  .setup-note {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.6;
  }
  .setup-note a { color: var(--accent-dim); }

  .btn-primary {
    width: 100%;
    margin-top: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px;
    font-size: 0.85rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MAIN */
  #main { display: none; padding: 0 20px; }

  /* INPUT BAR */
  .input-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  .input-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-size: 0.9rem;
    font-family: 'Noto Sans JP', sans-serif;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-bar input:focus { border-color: var(--accent); }

  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    width: 46px;
    height: 46px;
    font-size: 1.4rem;
    cursor: pointer;
    border-radius: 2px;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.8; }
  .add-btn:disabled { opacity: 0.4; }

  /* SECTION */
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 20px 0 10px;
  }

  /* TODO ITEM */
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-box {
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--muted);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .check-box:hover { border-color: var(--accent); }
  .check-box.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-box.checked::after {
    content: '';
    width: 6px; height: 10px;
    border: 2px solid #000;
    border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  .todo-text {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.5;
    font-weight: 300;
  }
  .todo-text.done {
    text-decoration: line-through;
    color: var(--muted);
  }

  .todo-meta {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    margin-top: 1px;
    transition: color 0.2s;
  }
  .delete-btn:hover { color: var(--danger); }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--accent);
    color: #000;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 2px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* STATUS */
  #status {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .readonly-badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.65rem;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 2px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px 20px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  .count-badge {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    margin-left: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>TODO</h1>
  <span id="readonly-label"></span>
  <button class="share-btn" id="share-btn" onclick="copyShareURL()" style="display:none">SHARE</button>
</header>

<!-- SETUP PANEL -->
<div id="setup-panel">
  <h2>SETUP — GitHub Issues API</h2>
  <div class="field">
    <label>GITHUB USERNAME</label>
    <input id="inp-owner" type="text" placeholder="your-username" autocomplete="off">
  </div>
  <div class="field">
    <label>REPOSITORY NAME</label>
    <input id="inp-repo" type="text" placeholder="my-todo" autocomplete="off">
  </div>
  <div class="field">
    <label>PERSONAL ACCESS TOKEN <span style="color:#555">（自分の端末のみ・共有されません）</span></label>
    <input id="inp-token" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
  </div>
  <p class="setup-note">
    ① GitHubで新しい<strong style="color:#f0f0f0">プライベートリポジトリ</strong>を作成<br>
    ② <a href="https://github.com/settings/tokens" target="_blank">Settings → Tokens (classic)</a> でトークン発行（scopeは <code>repo</code>）<br>
    ③ トークンはこのデバイスのみに保存されます
  </p>
  <button class="btn-primary" id="connect-btn" onclick="connect()">接続する</button>
</div>

<!-- MAIN -->
<div id="main">
  <p class="section-label">ACTIVE <span class="count-badge" id="active-count"></span></p>
  <div id="active-list"></div>

  <p class="section-label" id="done-label" style="display:none">DONE <span class="count-badge" id="done-count"></span></p>
  <div id="done-list"></div>

  <div id="status"></div>
  <div class="empty-state" id="empty-state" style="display:none">タスクなし</div>
</div>

<!-- INPUT BAR -->
<div class="input-bar" id="input-bar" style="display:none">
  <input id="todo-input" type="text" placeholder="新しいタスクを入力..." maxlength="200"
    onkeydown="if(event.key==='Enter')addTodo()">
  <button class="add-btn" id="add-btn" onclick="addTodo()">＋</button>
</div>

<div id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────
let owner = '', repo = '', token = '';
let todos = [];
let readOnly = false;

// ─── INIT ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const sharedOwner = params.get('o');
  const sharedRepo  = params.get('r');

  if (sharedOwner && sharedRepo) {
    // 共有URLで開いた場合 → 読み取り専用モード
    readOnly = true;
    owner = sharedOwner;
    repo  = sharedRepo;
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('readonly-label').innerHTML =
      '<span class="readonly-badge">READ ONLY</span>';
    startMain();
  } else {
    // ローカルストレージから復元
    owner = localStorage.getItem('gh_owner') || '';
    repo  = localStorage.getItem('gh_repo')  || '';
    token = localStorage.getItem('gh_token') || '';
    if (owner && repo && token) {
      document.getElementById('setup-panel').style.display = 'none';
      document.getElementById('share-btn').style.display = 'block';
      startMain();
    } else {
      document.getElementById('inp-owner').value = owner;
      document.getElementById('inp-repo').value  = repo;
    }
  }
});

// ─── CONNECT ──────────────────────────────────────────
async function connect() {
  owner = document.getElementById('inp-owner').value.trim();
  repo  = document.getElementById('inp-repo').value.trim();
  token = document.getElementById('inp-token').value.trim();

  if (!owner || !repo || !token) { toast('すべての項目を入力してください'); return; }

  const btn = document.getElementById('connect-btn');
  btn.disabled = true; btn.textContent = '接続中...';

  // 接続テスト
  const r = await ghFetch(`https://api.github.com/repos/${owner}/${repo}`, 'GET');
  if (!r.ok) {
    toast('接続失敗。情報を確認してください');
    btn.disabled = false; btn.textContent = '接続する';
    return;
  }

  localStorage.setItem('gh_owner', owner);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_token', token);

  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('share-btn').style.display = 'block';
  startMain();
}

// ─── MAIN START ───────────────────────────────────────
function startMain() {
  document.getElementById('main').style.display = 'block';
  if (!readOnly) document.getElementById('input-bar').style.display = 'flex';
  loadTodos();
}

// ─── LOAD TODOS ───────────────────────────────────────
async function loadTodos() {
  setStatus('<span class="spinner"></span> 読み込み中...');

  const url = `https://api.github.com/repos/${owner}/${repo}/issues?state=all&labels=todo&per_page=100`;
  const r = await ghFetch(url, 'GET');
  if (!r.ok) { setStatus('読み込みエラー'); return; }

  const issues = await r.json();
  todos = issues.map(i => ({
    id:     i.number,
    title:  i.title,
    done:   i.state === 'closed',
    date:   i.created_at
  }));

  setStatus('');
  render();
}

// ─── RENDER ───────────────────────────────────────────
function render() {
  const active = todos.filter(t => !t.done);
  const done   = todos.filter(t => t.done);

  document.getElementById('active-count').textContent = active.length || '';
  document.getElementById('active-list').innerHTML = active.map(itemHTML).join('');

  if (done.length > 0) {
    document.getElementById('done-label').style.display = 'block';
    document.getElementById('done-count').textContent = done.length;
    document.getElementById('done-list').innerHTML = done.map(itemHTML).join('');
  } else {
    document.getElementById('done-label').style.display = 'none';
    document.getElementById('done-list').innerHTML = '';
  }

  document.getElementById('empty-state').style.display =
    (todos.length === 0) ? 'block' : 'none';
}

function itemHTML(t) {
  const date = new Date(t.date).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric'});
  const deleteBtn = readOnly ? '' :
    `<button class="delete-btn" onclick="deleteTodo(${t.id})" title="削除">×</button>`;
  const checkClick = readOnly ? '' : `onclick="toggleTodo(${t.id},${t.done})"`;

  return `
  <div class="todo-item" id="item-${t.id}">
    <div class="check-box ${t.done ? 'checked' : ''}" ${checkClick}></div>
    <div style="flex:1">
      <div class="todo-text ${t.done ? 'done' : ''}">${escHtml(t.title)}</div>
      <div class="todo-meta">#${t.id} · ${date}</div>
    </div>
    ${deleteBtn}
  </div>`;
}

// ─── ADD ──────────────────────────────────────────────
async function addTodo() {
  const inp = document.getElementById('todo-input');
  const title = inp.value.trim();
  if (!title) return;

  const btn = document.getElementById('add-btn');
  btn.disabled = true;

  const r = await ghFetch(
    `https://api.github.com/repos/${owner}/${repo}/issues`,
    'POST',
    { title, labels: ['todo'] }
  );

  if (r.ok) {
    const issue = await r.json();
    todos.unshift({ id: issue.number, title: issue.title, done: false, date: issue.created_at });
    inp.value = '';
    render();
    toast('追加しました');
  } else {
    toast('追加に失敗しました');
  }
  btn.disabled = false;
}

// ─── TOGGLE ───────────────────────────────────────────
async function toggleTodo(id, isDone) {
  const newState = isDone ? 'open' : 'closed';
  const r = await ghFetch(
    `https://api.github.com/repos/${owner}/${repo}/issues/${id}`,
    'PATCH',
    { state: newState }
  );
  if (r.ok) {
    const t = todos.find(x => x.id === id);
    if (t) t.done = !isDone;
    render();
  } else {
    toast('更新に失敗しました');
  }
}

// ─── DELETE ───────────────────────────────────────────
async function deleteTodo(id) {
  // GitHub API はIssueを完全削除できないのでラベル削除＋closeで対応
  await ghFetch(
    `https://api.github.com/repos/${owner}/${repo}/issues/${id}/labels/todo`,
    'DELETE'
  );
  await ghFetch(
    `https://api.github.com/repos/${owner}/${repo}/issues/${id}`,
    'PATCH',
    { state: 'closed' }
  );
  todos = todos.filter(t => t.id !== id);
  render();
  toast('削除しました');
}

// ─── SHARE ────────────────────────────────────────────
function copyShareURL() {
  const url = `${location.origin}${location.pathname}?o=${encodeURIComponent(owner)}&r=${encodeURIComponent(repo)}`;
  navigator.clipboard.writeText(url).then(() => toast('URLをコピーしました'));
}

// ─── HELPERS ──────────────────────────────────────────
async function ghFetch(url, method, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(url, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined
  });
}

function setStatus(html) {
  document.getElementById('status').innerHTML = html;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
